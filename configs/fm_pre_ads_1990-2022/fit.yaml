model:
    class_path: Prithvi
    init_args:
        prithvi_params:
            model_args:
                decoder_depth: 8
                decoder_embed_dim: 512
                decoder_num_heads: 16
                depth: 12
                embed_dim: 384
                img_size: 256
                in_chans: 6
                num_frames: 3
                num_heads: 12
                patch_size: 4
                tubelet_size: 1
            train_params:
                mask_ratio: 0.75
data:
    class_path: ChipsDataModule
    init_args:
        batch_size: 16
        num_workers: 64 
        chip_size: 256
        anno_data_path: null
trainer:
    callbacks:
      - class_path: PrithviCallbacks
    max_epochs: 256
    strategy: ddp
    devices: 1
    num_nodes: 2
optimizer:
    class_path: torch.optim.AdamW
    init_args:
        lr: 0.0005
lr_scheduler:
    class_path: torch.optim.lr_scheduler.StepLR
    init_args:
        step_size: 64
        gamma: 0.5

