#################################### train prithvi and unet

trainer:
    callbacks:
      - class_path: callbacks.LogTrainCallback
      - class_path: callbacks.LogTrainMulticlassExtCallback
    # max_epochs: 32
    # max_epochs: 96
    # max_epochs: 80
    max_epochs: 128
    # max_epochs: 1
    strategy: auto
    devices: 1
    num_nodes: 1
    accumulate_grad_batches: 1
    # accumulate_grad_batches: 8
    precision: bf16-mixed
optimizer:
    class_path: torch.optim.AdamW
    init_args:
        lr: 0.0001
lr_scheduler:
    class_path: torch.optim.lr_scheduler.CosineAnnealingLR
    init_args:
        T_max : 16
criterion:
    class_path: DiceLoss
    init_args:
        multiclass: true
activation:
    class_path: Softmax

