            - 1943.3809264895197
            - 3449.934562147595
            - 367.57940168554586
        stds:
            - 537.649909798381
            - 376.87032375429425
            - 292.3800669055506
            - 694.1559922842102
            - 830.7075035273823
            - 323.8907211324208
trainer:
    callbacks:
      - class_path: PrithviFCNCallbacks
